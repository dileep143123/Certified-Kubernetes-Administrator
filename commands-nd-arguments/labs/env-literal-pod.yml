apiVersion: v1
kind: Pod
metadata:
  name: env-literal-pod
spec:
  containers:
  - name: app
    image: busybox:1.36
    imagePullPolicy: IfNotPresent
    command: ["sh", "-c"]
    args:
    - |
      echo "Starting demo pod..."
      echo "APP_COLOR=$APP_COLOR"
      echo "APP_MODE=$APP_MODE"
      echo "Printing all environment variables:"
      env
      sleep 3600
    env:
    - name: APP_COLOR
      value: blue
    - name: APP_MODE
      value: production
