apiVersion: v1
kind: Pod
metadata:
  name: init-demo
spec:
  initContainers:
    - name: init-wait
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Init container started";
          sleep 20;
          echo "Init container completed";

  containers:
    - name: app
      image: nginx:latest
