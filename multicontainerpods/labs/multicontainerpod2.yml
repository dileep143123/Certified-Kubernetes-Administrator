# in this multiple containers will communicate with each other over localhost
# for demonstration use the below command after running this yaml file
# wget -qO- http://localhost:80
apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod2
spec:
  containers:
    - name: webapp
      image: nginx:latest
    - name: client
      image: busybox:1.36
      command: ["sh", "-c", "sleep 4800"]
